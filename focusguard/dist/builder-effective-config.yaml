directories:
  output: dist
  buildResources: assets
appId: com.focusguard.app
productName: FocusGuard
copyright: Copyright © 2024 FocusGuard
icon: assets/icon.png
asar: true
asarUnpack:
  - assets/**
files:
  - filter:
      - main.js
      - preload.js
      - src/**/*
      - assets/**/*
      - '!**/node_modules/.cache/**'
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FocusGuard
  deleteAppDataOnUninstall: false
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/icon.png
  category: Utility
  synopsis: Deep Work Focus Timer
  description: Interval-based focus timer using 75-minute work sessions and 20-minute breaks
deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3
electronVersion: 33.4.11
